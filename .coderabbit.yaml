# CodeRabbit Configuration for ContextSafe
# ============================================
# CodeRabbit is free for open-source public repositories.
# Docs: https://docs.coderabbit.ai/guides/configure-coderabbit
#
# This config tailors reviews to our Python + TypeScript stack,
# respects our existing tooling (ruff, mypy, bandit), and keeps
# reviews in Spanish/English as appropriate.

# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "es-ES"

early_access: false

tone_instructions: |
  Sé conciso y constructivo. Prioriza la seguridad, la claridad del código
  y el respeto a las convenciones del proyecto. Usa español para comentarios
  generales pero inglés para términos técnicos (PR, API, NER, PII, etc.).

reviews:
  profile: "chill"
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  auto_title_placeholder: "@coderabbitai title"
  review_status: true
  poem: false
  collapse_walkthrough: true
  sequence_diagrams: true
  changed_files_summary: true
  abort_on_close: true
  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords:
      - "WIP"
      - "Draft"
      - "[skip ci]"
    drafts: false
    base_branches:
      - "main"
      - "develop"
  path_filters:
    - "!**/__pycache__/**"
    - "!**/.pytest_cache/**"
    - "!**/.mypy_cache/**"
    - "!**/.ruff_cache/**"
    - "!**/*.pyc"
    - "!**/node_modules/**"
    - "!frontend/dist/**"
    - "!frontend/build/**"
    - "!htmlcov/**"
    - "!coverage.xml"
    - "!.coverage"
  tools:
    # We already run these in CI; let CodeRabbit surface them inline
    ruff:
      enabled: true
    mypy:
      enabled: true
    bandit:
      enabled: true
    shellcheck:
      enabled: true
    markdownlint:
      enabled: true
    github-checks:
      enabled: true
    languagetool:
      enabled: true
      enabled_only: false
      level: "default"
  path_instructions:
    - path: "src/contextsafe/**"
      instructions: |
        Este es el código Python del backend. Asegúrate de que:
        - Los tipos estén anotados (mypy con las reglas del proyecto, no strict completo).
        - Las funciones públicas tengan docstrings.
        - No haya fugas de datos PII en logs o excepciones.
        - Se usen los puertos/adapter del dominio, no dependencias directas.
    - path: "tests/**"
      instructions: |
        Revisa que los tests sean deterministas, no dependan del orden,
        y usen fixtures apropiadas. Se valoran tests de propiedades (Hypothesis)
        y tests de propiedades (Hypothesis).
    - path: "frontend/src/**"
      instructions: |
        Código TypeScript/React del frontend. Verifica:
        - Uso correcto de tipos estrictos.
        - Manejo de errores en llamadas a la API.
        - No exponer datos sensibles en el estado global (Zustand).
    - path: "frontend/src/services/api.ts"
      instructions: |
        Punto crítico de comunicación con el backend. Revisa:
        - Sanitización de inputs antes de enviar.
        - Manejo de errores de red y timeouts.
        - No hardcodear URLs o tokens.
    - path: "docker/**"
      instructions: |
        Verifica que las imágenes no ejecuten como root, que se usen
        multi-stage builds, y que no se incluyan secretos.

chat:
  auto_reply: true
  create_issues: true

knowledge_base:
  opt_out: false
  learnings:
    scope: "local"

